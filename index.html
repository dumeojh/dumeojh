<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 안성여고 교육과정 박람회</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* 헤더: 모바일에서는 세로로 쌓이거나 공간 확보 */
        header { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.2rem; font-weight: bold; }
        
        .nav { display: flex; gap: 15px; list-style: none; margin: 0; padding: 0; }
        .nav li { cursor: pointer; padding: 5px; font-size: 0.9rem; }

        /* 메인 영역 */
        main { flex: 1; display: flex; flex-direction: column; }
        
        /* 상단 바: 모바일에서는 버튼들이 여러 줄로 나올 수 있게 설정 */
        #top-bar { min-height: 60px; background: #eee; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-bottom: 1px solid #ccc; }
        .sub-btn { padding: 6px 12px; background: white; border: 1px solid var(--primary); border-radius: 20px; font-size: 0.85rem; }

        /* PDF 뷰어: 모바일에서는 높이를 조절 */
        #content-body { flex: 1; padding: 10px; background: white; }
        iframe { width: 100%; height: 500px; border: 1px solid #ddd; }

        /* --- 미디어 쿼리: 화면이 768px 이하일 때 (태블릿/모바일) --- */
        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 10px; }
            .nav { justify-content: center; width: 100%; font-size: 0.8rem; }
            .logo { width: 100%; margin-bottom: 5px; }
            #top-bar { gap: 5px; }
            iframe { height: 400px; } /* 모바일은 화면이 작으므로 높이 축소 */
        }

        /* 풋터: 모바일에서 글자 크기 축소 */
        footer { background: #333; color: white; padding: 15px; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">안성여고 교육과정 박람회</div>
        <ul class="nav">
            <li onclick="alert('준비중입니다')">교과별 과목</li>
            <li onclick="alert('준비중입니다')">우리학교 교육과정</li>
            <li onclick="alert('관리자 모드는 PC를 권장합니다')">⚙️ 설정</li>
        </ul>
    </header>

    <main>
        <div id="top-bar">
            <button class="sub-btn">화법과 작문</button>
            <button class="sub-btn">언어와 매체</button>
            <button class="sub-btn">문학</button>
            <button class="sub-btn">독서</button>
        </div>
        <div id="content-body">
            <p style="color:#666; font-size:0.9rem;">모바일/태블릿에서는 PDF를 터치하여 확대해서 볼 수 있습니다.</p>
            <iframe src="about:blank"></iframe>
        </div>
    </main>

    <footer>
        <p>안성여자고등학교<br>Tel: 031-XXX-XXXX</p>
    </footer>

</body>
</html>
